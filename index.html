<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prestige Yachts Alliance | Team Portal</title>
    <meta name="description" content="Internal team portal for Prestige Yachts Alliance - Access yacht information, pricing, availability, and sales resources for luxury charters in Los Cabos." />
    <meta name="author" content="Prestige Yachts Alliance" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <meta property="og:title" content="Prestige Yachts Alliance | Team Portal" />
    <meta property="og:description" content="Internal team portal for luxury yacht charters in Los Cabos" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>

  <body>
    <!--
      Hidden static forms for Netlify Forms detection at build time.
      The React app submits via fetch() with `form-name` set to one of these names.
      Field names below MUST match the keys posted by src/lib/netlifyForms.ts.
    -->
    <form name="reservation" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="yacht_slug" />
      <input type="text" name="yacht_name" />
      <input type="text" name="date" />
      <input type="text" name="start_time" />
      <input type="text" name="end_time" />
      <input type="text" name="duration_hours" />
      <input type="text" name="guest_name" />
      <input type="email" name="guest_email" />
      <input type="tel" name="guest_phone" />
      <textarea name="notes"></textarea>
      <input type="text" name="cal_booking_id" />
      <input type="text" name="transaction_id" />
      <input type="text" name="bot-field" />
    </form>

    <form name="reservation_lead" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="experience_id" />
      <input type="text" name="experience_title" />
      <input type="text" name="preferred_date" />
      <input type="text" name="backup_date" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="number" name="guests" />
      <textarea name="notes"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <form name="inquiry" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="number" name="guests" />
      <input type="text" name="experience" />
      <textarea name="notes"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
